<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 620" role="img" aria-label="Immersive reading table">
  <defs>
    <linearGradient id="table" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1d423f"/>
      <stop offset="0.48" stop-color="#312850"/>
      <stop offset="1" stop-color="#0f172a"/>
    </linearGradient>
    <radialGradient id="lamp" cx="50%" cy="30%" r="70%">
      <stop offset="0" stop-color="#ffe8a3" stop-opacity="0.95"/>
      <stop offset="0.42" stop-color="#b8892d" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <style>
      .title{font:700 40px Arial,"Microsoft YaHei",sans-serif;fill:#fff8df}
      .sub{font:22px Arial,"Microsoft YaHei",sans-serif;fill:#d8f5ee}
      .label{font:700 20px Arial,"Microsoft YaHei",sans-serif;fill:#2b2147}
      .card{fill:#f8efd2;stroke:#e6c86e;stroke-width:6}
    </style>
  </defs>
  <rect width="1200" height="620" fill="url(#table)"/>
  <circle cx="600" cy="190" r="430" fill="url(#lamp)"/>
  <text x="70" y="76" class="title">Visual Reading Mode / 图片与动画沉浸测试</text>
  <text x="70" y="116" class="sub">Use images, short videos, desk scenes, mood boards, or demo animations as symbolic anchors.</text>
  <g transform="translate(174 170)">
    <rect class="card" width="190" height="280" rx="18" transform="rotate(-8 95 140)"/>
    <text x="95" y="126" text-anchor="middle" class="label">Visual</text>
    <text x="95" y="158" text-anchor="middle" class="label">Anchor</text>
  </g>
  <g transform="translate(505 152)">
    <rect class="card" width="190" height="280" rx="18"/>
    <circle cx="95" cy="108" r="44" fill="none" stroke="#6d5dd3" stroke-width="8"/>
    <path d="M95 48v120M35 108h120" stroke="#6d5dd3" stroke-width="7" stroke-linecap="round"/>
    <text x="95" y="220" text-anchor="middle" class="label">Question</text>
  </g>
  <g transform="translate(836 170)">
    <rect class="card" width="190" height="280" rx="18" transform="rotate(8 95 140)"/>
    <path d="M95 62c32 42 56 76 56 112s-24 70-56 112c-32-42-56-76-56-112s24-70 56-112z" fill="none" stroke="#3b8c86" stroke-width="8"/>
    <text x="95" y="232" text-anchor="middle" class="label">Reading</text>
  </g>
  <g transform="translate(70 510)">
    <rect width="1060" height="62" rx="18" fill="#ffffff" opacity="0.12" stroke="#e6c86e" stroke-opacity="0.55"/>
    <text x="26" y="40" class="sub">Observe visible details first, then read them symbolically. Never infer identity, health, lifespan, or sensitive traits from appearance.</text>
  </g>
</svg>
