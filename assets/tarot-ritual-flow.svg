<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 360" role="img" aria-label="Tarot ritual process">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#f8f1df"/>
      <stop offset="1" stop-color="#e4fbf6"/>
    </linearGradient>
    <style>
      .title{font:700 34px Arial,"Microsoft YaHei",sans-serif;fill:#26213f}
      .label{font:700 24px Arial,"Microsoft YaHei",sans-serif;fill:#26213f}
      .desc{font:18px Arial,"Microsoft YaHei",sans-serif;fill:#504a66}
      .num{font:700 22px Arial,sans-serif;fill:#fff}
    </style>
  </defs>
  <rect width="1200" height="360" rx="30" fill="url(#bg)"/>
  <text x="60" y="64" class="title">Tarot Ritual Flow / 塔罗完整流程</text>
  <g transform="translate(58 118)">
    <g>
      <circle cx="36" cy="36" r="28" fill="#6d5dd3"/><text x="29" y="44" class="num">1</text>
      <text x="0" y="98" class="label">定问题</text><text x="0" y="126" class="desc">Focus question</text>
    </g>
    <path d="M145 36h80" stroke="#9f91dd" stroke-width="6" stroke-linecap="round"/>
    <g transform="translate(246 0)">
      <circle cx="36" cy="36" r="28" fill="#3b8c86"/><text x="29" y="44" class="num">2</text>
      <text x="-3" y="98" class="label">洗牌</text><text x="-20" y="126" class="desc">Shuffle deck</text>
    </g>
    <path d="M391 36h80" stroke="#9f91dd" stroke-width="6" stroke-linecap="round"/>
    <g transform="translate(492 0)">
      <circle cx="36" cy="36" r="28" fill="#b8892d"/><text x="29" y="44" class="num">3</text>
      <text x="-3" y="98" class="label">切牌</text><text x="-18" y="126" class="desc">Three piles</text>
    </g>
    <path d="M637 36h80" stroke="#9f91dd" stroke-width="6" stroke-linecap="round"/>
    <g transform="translate(738 0)">
      <circle cx="36" cy="36" r="28" fill="#8b4e7a"/><text x="29" y="44" class="num">4</text>
      <text x="-3" y="98" class="label">发牌</text><text x="-18" y="126" class="desc">Lay spread</text>
    </g>
    <path d="M883 36h80" stroke="#9f91dd" stroke-width="6" stroke-linecap="round"/>
    <g transform="translate(984 0)">
      <circle cx="36" cy="36" r="28" fill="#2f446f"/><text x="29" y="44" class="num">5</text>
      <text x="-3" y="98" class="label">翻牌</text><text x="-24" y="126" class="desc">Reveal story</text>
    </g>
  </g>
  <text x="60" y="306" class="desc">The script can output shuffle rounds, cut order, spread positions, reveal sequence, card orientation, bilingual card names, and keywords.</text>
