<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 520" role="img" aria-label="Three-card tarot spread">
  <defs>
    <linearGradient id="table" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#173f42"/>
      <stop offset="1" stop-color="#2b2147"/>
    </linearGradient>
    <linearGradient id="cardFace" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fff8df"/>
      <stop offset="1" stop-color="#ead9a6"/>
    </linearGradient>
    <style>
      .title{font:700 38px Arial,"Microsoft YaHei",sans-serif;fill:#fff8df}
      .cardTitle{font:700 25px Arial,"Microsoft YaHei",sans-serif;fill:#2b2147}
      .cardSub{font:19px Arial,"Microsoft YaHei",sans-serif;fill:#5d526f}
      .label{font:700 26px Arial,"Microsoft YaHei",sans-serif;fill:#fff8df}
      .desc{font:20px Arial,"Microsoft YaHei",sans-serif;fill:#d8f5ee}
    </style>
  </defs>
  <rect width="1200" height="520" rx="30" fill="url(#table)"/>
  <text x="60" y="68" class="title">Three-Card Spread / 三张牌牌阵</text>
  <g transform="translate(160 118)">
    <g>
      <rect width="210" height="300" rx="18" fill="url(#cardFace)" stroke="#e6c86e" stroke-width="7"/>
      <circle cx="105" cy="118" r="52" fill="none" stroke="#6d5dd3" stroke-width="8"/>
      <path d="M105 52v132M39 118h132" stroke="#6d5dd3" stroke-width="7" stroke-linecap="round"/>
      <text x="105" y="226" text-anchor="middle" class="cardTitle">Past / Root</text>
      <text x="105" y="258" text-anchor="middle" class="cardSub">过去 / 根源</text>
    </g>
    <g transform="translate(335 0)">
      <rect width="210" height="300" rx="18" fill="url(#cardFace)" stroke="#e6c86e" stroke-width="7"/>
      <path d="M105 52c34 45 60 80 60 118s-26 73-60 118c-34-45-60-80-60-118s26-73 60-118z" fill="none" stroke="#3b8c86" stroke-width="8"/>
      <circle cx="105" cy="170" r="32" fill="#3b8c86" opacity="0.24"/>
      <text x="105" y="226" text-anchor="middle" class="cardTitle">Present</text>
      <text x="105" y="258" text-anchor="middle" class="cardSub">现在 / 挑战</text>
    </g>
    <g transform="translate(670 0)">
      <rect width="210" height="300" rx="18" fill="url(#cardFace)" stroke="#e6c86e" stroke-width="7"/>
      <path d="M105 58l18 58 60 1-49 35 18 58-47-36-48 36 18-58-49-35 61-1z" fill="none" stroke="#b8892d" stroke-width="8" stroke-linejoin="round"/>
      <text x="105" y="226" text-anchor="middle" class="cardTitle">Near Future</text>
      <text x="105" y="258" text-anchor="middle" class="cardSub">趋势 / 建议</text>
    </g>
  </g>
  <text x="160" y="470" class="desc">A simple spread for reading a situation as a story: where it comes from, where it stands, and how to move with it.</text>
</svg>
